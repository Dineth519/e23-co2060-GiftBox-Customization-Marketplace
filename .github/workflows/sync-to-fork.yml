name: Sync to Fork and Deploy

on:
  push:
    branches:
      - develop

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to fork host branch
        run: |
          git config user.email "dinethsanju519@gmail.com"
          git config user.name "Dineth519"
          git remote add fork https://Dineth519:${{ secrets.FORK_TOKEN }}@github.com/Dineth519/e23-co2060-GiftBox-Customization-Marketplace
          git push fork develop:host --force
