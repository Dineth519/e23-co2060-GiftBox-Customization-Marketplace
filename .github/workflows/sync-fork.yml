name: Auto Sync Fork

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes to your fork
    steps:
      - name: Sync 'host' branch with upstream
        run: gh repo sync $GITHUB_REPOSITORY --branch host --source cepdnaclk/e23-co2060-GiftBox-Customization-Marketplace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
