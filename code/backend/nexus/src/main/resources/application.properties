# ============================================
# application.properties — All Settings
# ============================================

spring.application.name=nexus
spring.config.import=optional:classpath:.env[.properties]


# ── Database (Aiven MySQL - Production) ──────
spring.datasource.url=jdbc:mysql://mysql-25173374-giftora033-9453.h.aivencloud.com:25409/defaultdb?ssl-mode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Flyway ────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true

# ── JPA / Hibernate ───────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Colombo

# ── Email (Gmail SMTP) ────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=giftora033@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── Server ────────────────────────────────────
server.port=8080
# Localhost uses Lax and false (for HTTP). Azure/Prod uses None and true (for HTTPS cross-domain).
server.servlet.session.cookie.same-site=${COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# ── CORS ──────────────────────────────────────
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000,http://localhost:5173,https://*.vercel.app}

# ── Jackson JSON ──────────────────────────────
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE